<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kognetic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ============================================================
       LOGIN VIEW — shown when no active session
       Mirrors dashboard AuthWrapper.tsx design
       ============================================================ -->
  <div id="loginView" class="login-view hidden">
    <div class="login-card">
      <h1>Kognetic</h1>
      <p class="subtitle">Memory System</p>

      <form id="loginForm" class="login-form">
        <input
          type="email"
          id="loginEmail"
          class="login-input"
          placeholder="Email Address"
          required
          autocomplete="email"
        >
        <input
          type="password"
          id="loginPassword"
          class="login-input"
          placeholder="Password"
          required
          autocomplete="current-password"
        >
        <div id="loginError" class="login-error hidden"></div>
        <button type="submit" id="loginSubmit" class="login-submit">Sign In</button>
      </form>

      <div class="login-divider">
        <button type="button" id="loginToggle" class="login-toggle">
          Don't have an account? Sign up
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       CAPTURE VIEW — shown when authenticated
       ============================================================ -->
  <div id="captureView" class="capture-view hidden">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <h1>Kognetic</h1>
        <p>SAVE TO YOUR SECOND BRAIN</p>
      </div>
      <div class="header-actions">
        <span id="userEmail" class="user-email"></span>
        <!-- Logout icon (door with arrow) -->
        <button id="logoutBtn" class="logout-btn" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Page info card -->
    <div class="card page-info">
      <div class="card-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span>Page Capture</span>
      </div>
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-url" id="pageUrl">Loading...</div>
    </div>

    <!-- Tags -->
    <div class="tags-section">
      <div class="tags-header">Select Tags</div>
      <div id="tagsContainer" class="tags-container">
        <div class="tags-loading">Loading tags...</div>
      </div>
    </div>

    <!-- Note card -->
    <div class="card note-card">
      <textarea id="noteInput" placeholder="Add a thought (optional)"></textarea>
      <div class="ai-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        <span>Core Active</span>
      </div>
    </div>

    <!-- Save button -->
    <button id="saveBtn" class="save-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      <span>Save Page</span>
    </button>
  </div>

  <!-- ============================================================
       TOAST CONTAINER — sliding notifications
       ============================================================ -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="popup.js"></script>
</body>
</html>
